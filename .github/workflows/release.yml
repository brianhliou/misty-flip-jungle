name: release
# Tag a version (e.g. `git tag v0.2.0 && git push --tags`) → build the x86-64 Linux
# binary and publish it as a GitHub release asset. Downstreams can curl the binary at
# https://github.com/brianhliou/misty-flip-jungle/releases/latest/download/jungle-flip-engine
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (stable, minimal)
        run: rustup toolchain install stable --profile minimal --no-self-update
      - name: Build (release, x86-64 linux)
        run: cargo build --release -p jungle-flip-engine
      - name: Build ≤4 tablebase (WLD + distance-to-mate, ~10 min on a runner)
        run: |
          mkdir -p dist
          cargo run --release --no-default-features -p jungle_flip_rust --bin build_tb -- 4 dist/jungle_flip_tb_4.bin
      - name: Stage binary + checksums
        run: |
          cp target/release/jungle-flip-engine dist/jungle-flip-engine
          sha256sum dist/jungle-flip-engine | awk '{print $1}' > dist/jungle-flip-engine.sha256
          sha256sum dist/jungle_flip_tb_4.bin | awk '{print $1}' > dist/jungle_flip_tb_4.bin.sha256
          printf 'uci\nquit\n' | ./dist/jungle-flip-engine | head -3
          # the binary must pick the artifact up when it sits next to the executable.
          # JF_TIE_SEED=0 pins the deterministic (legacy) move so the random tie-break
          # among exactly-equal moves can't flake this golden assertion.
          printf 'position fen 3E/1r2/3t/4 b - 0 47\ngo nodes 512000\nquit\n' | JF_TIE_SEED=0 ./dist/jungle-flip-engine | grep -x 'bestmove b2c2'
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/jungle-flip-engine
            dist/jungle-flip-engine.sha256
            dist/jungle_flip_tb_4.bin
            dist/jungle_flip_tb_4.bin.sha256
          generate_release_notes: true
